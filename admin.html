<h2>Admin Panel</h2>
<div id="admin-list">Loading Requests...</div>

<script type="module">
    // ... Imports & Config ...
    const listDiv = document.getElementById('admin-list');

    // Simple Query (No OrderBy to avoid Index Error)
    onSnapshot(collection(db, "withdrawals"), (snap) => {
        listDiv.innerHTML = "";
        if (snap.empty) listDiv.innerHTML = "No requests found.";
        snap.forEach(docRes => {
            const data = docRes.data();
            const id = docRes.id;
            listDiv.innerHTML += `
                <div style="background:white; padding:10px; margin:10px; border-radius:8px;">
                    <p><b>User:</b> ${data.name} | <b>Phone:</b> ${data.phone}</p>
                    <p><b>Amount:</b> ₹${data.amount} | <b>UPI:</b> ${data.upi}</p>
                    <p><b>Status:</b> ${data.status}</p>
                    <button onclick="updateStatus('${id}', 'Approved')">Approve</button>
                    <button onclick="updateStatus('${id}', 'Paid')">Mark Paid</button>
                </div>`;
        });
    });

    window.updateStatus = async (id, s) => {
        await updateDoc(doc(db, "withdrawals", id), { status: s });
        alert("Updated to " + s);
    };
</script>
