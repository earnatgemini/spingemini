<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Spin & Earn</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        #wheel-container { margin: 50px auto; position: relative; width: 300px; height: 300px; }
        canvas { border: 5px solid #333; border-radius: 50%; }
        #spin-btn { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>స్పిన్ చేయండి - డబ్బు సంపాదించండి!</h1>
    <div id="wheel-container">
        <canvas id="wheel" width="300" height="300"></canvas>
    </div>
    <button id="spin-btn">Spin Now</button>
    <p id="result"></p>

    </body>
</html>
