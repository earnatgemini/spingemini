<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Spin & Earn - Bucks</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .dashboard { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; margin-top: 20px; min-width: 300px; }
        .balance-box { display: flex; justify-content: space-around; margin: 15px 0; font-size: 18px; }
        .stat { font-weight: bold; color: #28a745; }
        #wheel-container { margin: 20px auto; position: relative; width: 300px; height: 300px; }
        canvas { border: 8px solid #333; border-radius: 50%; background: white; transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); width: 100%; height: 100%; }
        .btn { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 25px; margin: 5px; transition: 0.3s; color: white; width: 80%; max-width: 300px; }
        #spin-btn { background: #ff4757; font-weight: bold; }
        #login-btn { background: #4285F4; margin-top: 50px; }
        .bonus-btn { background: #1e90ff; }
        .withdraw-btn { background: #ffa502; }
        .ad-slot { width: 100%; height: 90px; background: #ddd; margin: 15px 0; line-height: 90px; color: #666; overflow: hidden; }
        #game-area { display: none; }
    </style>
</head>
<body>

    <button id="login-btn" class="btn">Google తో లాగిన్ అవ్వండి</button>

    <div id="game-area">
        <div class="ad-slot">Top Adsterra Banner Here</div>

        <div class="dashboard">
            <h3 id="user-name">హలో!</h3>
            <div class="balance-box">
                <div>Bucks: <span id="bucks-bal" class="stat">0</span></div>
                <div>Wallet: <span id="wallet-bal" class="stat">₹0</span></div>
            </div>
            <div>నేటి స్పిన్స్: <span id="spins-left">50</span>/50</div>
            <button class="btn withdraw-btn" onclick="handleWithdraw()">Withdraw (Min ₹50)</button>
        </div>

        <div id="wheel-container">
            <canvas id="wheel" width="300" height="300"></canvas>
        </div>

        <button id="spin-btn" class="btn" onclick="startSpin()">Spin Now</button>
        
        <div style="margin-top: 20px;">
            <button class="btn bonus-btn" onclick="claimBonus('daily')">Daily Bonus (950 Bucks)</button>
            <button class="btn bonus-btn" onclick="claimBonus('hourly')">Hourly Bonus (500 Bucks)</button>
        </div>

        <div class="ad-slot">Bottom Adsterra Banner Here</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot, serverTimestamp, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1P5PoYl467FXxaaWFaCGHWuZs1yUMGwY",
            authDomain: "gemini-spinning-wheel-game.firebaseapp.com",
            projectId: "gemini-spinning-wheel-game",
            storageBucket: "gemini-spinning-wheel-game.firebasestorage.app",
            messagingSenderId: "691322332189",
            appId: "1:691322332189:web:e757b79d4d9eb010b692f4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userData = { bucks: 0, spinsToday: 0, walletRupees: 0 };

        // 1. లాగిన్ లాజిక్
        document.getElementById('login-btn').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                alert("Login Error: " + error.message);
            }
        };

        // 2. యూజర్ డేటా చెక్ & డైలీ రీసెట్
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
                document.getElementById('user-name').innerText = "హలో, " + user.displayName;

                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                const today = new Date().toDateString();

                if (!userSnap.exists()) {
                    await setDoc(userRef, { bucks: 0, walletRupees: 0, spinsToday: 0, lastDate: today });
                } else if (userSnap.data().lastDate !== today) {
                    // రోజు మారింది కాబట్టి స్పిన్స్ రీసెట్
                    await updateDoc(userRef, { spinsToday: 0, lastDate: today });
                }

                onSnapshot(userRef, (doc) => {
                    userData = doc.data();
                    document.getElementById('bucks-bal').innerText = userData.bucks;
                    document.getElementById('wallet-bal').innerText = "₹" + userData.walletRupees;
                    document.getElementById('spins-left').innerText = (50 - userData.spinsToday);
                });
            }
        });

        // 3. స్పిన్ ఫంక్షన్
        window.startSpin = async () => {
            if (userData.spinsToday >= 50) return alert("ఈ రోజు కోటా అయిపోయింది!");
            
            const wheel = document.getElementById('wheel');
            const randomDeg = Math.floor(Math.random() * 360) + 3600;
            wheel.style.transform = `rotate(${randomDeg}deg)`;

            setTimeout(async () => {
                const won = Math.floor(Math.random() * 200) + 1;
                alert(`మీరు ${won} Bucks గెలిచారు!`);
                
                const userRef = doc(db, "users", auth.currentUser.uid);
                const newBucks = userData.bucks + won;
                await updateDoc(userRef, {
                    bucks: newBucks,
                    spinsToday: increment(1),
                    walletRupees: Math.floor(newBucks / 1000)
                });
            }, 4000);
        };

        // 4. బోనస్ & విత్ డ్రా
        window.claimBonus = (type) => {
            window.open("YOUR_ADSTERRA_DIRECT_LINK", "_blank");
            const bonus = type === 'daily' ? 950 : 500;
            updateDoc(doc(db, "users", auth.currentUser.uid), {
                bucks: increment(bonus),
                walletRupees: Math.floor((userData.bucks + bonus) / 1000)
            });
        };

        window.handleWithdraw = async () => {
            if (userData.walletRupees < 50) return alert("కనీసం ₹50 ఉండాలి.");
            const upi = prompt("Enter UPI ID:");
            const ph = prompt("Enter Phone:");
            if (upi && ph) {
                await addDoc(collection(db, "withdrawals"), {
                    uid: auth.currentUser.uid,
                    upi, ph, amount: userData.walletRupees,
                    status: "Pending", time: serverTimestamp()
                });
                alert("రిక్వెస్ట్ పంపబడింది!");
            }
        };

        // వీల్ డ్రాయింగ్
        const ctx = document.getElementById('wheel').getContext('2d');
        const colors = ['#ff4757', '#2f3542', '#ffa502', '#2ed573', '#1e90ff', '#3742fa', '#8e44ad', '#f1c40f'];
        for(let i=0; i<8; i++) {
            ctx.beginPath();
            ctx.moveTo(150,150);
            ctx.arc(150,150,150, i*Math.PI/4, (i+1)*Math.PI/4);
            ctx.fillStyle = colors[i];
            ctx.fill();
        }
    </script>
</body>
</html>
