<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Spin & Earn - Revenue Max</title>
    
    <script src="https://pl28980962.profitablecpmratenetwork.com/df/a8/bb/dfa8bbc977c188242de4e07ea4519433.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .dashboard { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; margin-top: 15px; min-width: 320px; }
        .balance-box { display: flex; justify-content: space-around; margin: 15px 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .stat { font-weight: bold; color: #2ecc71; }
        #wheel-container { margin: 20px auto; position: relative; width: 280px; height: 280px; }
        #wheel { border: 5px solid #333; border-radius: 50%; width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .btn { padding: 12px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 5px; width: 85%; max-width: 300px; color: white; font-weight: bold; }
        #spin-btn { background: #e74c3c; }
        .bonus-btn { background: #3498db; }
        .withdraw-btn { background: #f39c12; }
        .ref-box { background: #ecf0f1; padding: 10px; margin-top: 15px; border-radius: 8px; font-size: 13px; word-break: break-all; }
        #game-area, #login-section { display: none; }
        #history-list li { background: #f9f9f9; margin-bottom: 8px; padding: 10px; border-radius: 8px; text-align: left; border-left: 5px solid #3498db; list-style: none; }
    </style>
</head>
<body>

    <div id="login-section">
        <h2 style="margin-top: 50px;">Spin & Earn</h2>
        <p>Login with Referral Link</p>
        <button id="login-btn" class="btn" style="background: #4285F4;">Google Login</button>
    </div>

    <div id="game-area">
        <div class="dashboard">
            <h3 id="user-name">Loading...</h3>
            <div class="balance-box">
                <div>Bucks: <span id="bucks-bal" class="stat">0</span></div>
                <div>Wallet: <span id="wallet-bal" class="stat">₹0</span></div>
            </div>
            <div style="font-size: 14px; margin-bottom: 10px;">
                Spins: <span id="spins-left">0</span> | Refs: <span id="ref-count">0</span>
            </div>
            <button class="btn withdraw-btn" id="withdraw-action-btn">Withdraw (Min ₹50 + 1 Ref)</button>
            <div class="ref-box">Link: <span id="ref-link"></span></div>
        </div>

        <div id="wheel-container">
            <canvas id="wheel" width="300" height="300"></canvas>
        </div>

        <div style="margin: 10px auto; width: 320px; min-height: 50px;">
            <script type="text/javascript">
                atOptions = { 'key' : 'dfd54a903787abb736147e0c8dce5868', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/dfd54a903787abb736147e0c8dce5868/invoke.js"></script>
        </div>

        <button id="spin-btn" class="btn">Spin (50 Bucks)</button>
        
        <div style="margin-top: 10px;">
            <button id="daily-btn" class="btn bonus-btn">Daily Reward (+10 Spins)</button>
            <button id="hourly-btn" class="btn bonus-btn">Hourly Reward (+5 Spins)</button>
        </div>

        <div id="history-section" style="margin: 20px auto; max-width: 350px; text-align: left; background: white; padding: 15px; border-radius: 12px;">
            <h4>💸 Payment History</h4>
            <ul id="history-list" style="font-size: 12px; padding: 0;"></ul>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot, serverTimestamp, collection, addDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1P5PoYl467FXxaaWFaCGHWuZs1yUMGwY",
            authDomain: "gemini-spinning-wheel-game.firebaseapp.com",
            projectId: "gemini-spinning-wheel-game",
            storageBucket: "gemini-spinning-wheel-game.firebasestorage.app",
            messagingSenderId: "691322332189",
            appId: "1:691322332189:web:e757b79d4d9eb010b692f4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const smartLink = "https://www.profitablecpmratenetwork.com/bhzscizvg?key=fda7241a1c299d27f1f7ada0b1f723b1";
        let userData = {};
        let spinCounter = 0; // ప్రతి 10 స్పిన్లకు యాడ్ కోసం
        const urlParams = new URLSearchParams(window.location.search);
        const referrerId = urlParams.get('ref');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    if (!referrerId) { alert("Need Ref Link!"); auth.signOut(); return; }
                    await setDoc(userRef, { bucks: 100, walletRupees: 0, spinsToday: 10, referredBy: referrerId, referralCount: 0, lastSpin: 0 });
                    await updateDoc(doc(db, "users", referrerId), { referralCount: increment(1) });
                }

                document.getElementById('login-section').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
                document.getElementById('ref-link').innerText = window.location.origin + window.location.pathname + "?ref=" + user.uid;

                onSnapshot(userRef, (doc) => {
                    userData = doc.data();
                    document.getElementById('user-name').innerText = "Hello, " + user.displayName;
                    document.getElementById('bucks-bal').innerText = userData.bucks;
                    document.getElementById('wallet-bal').innerText = "₹" + userData.walletRupees;
                    document.getElementById('spins-left').innerText = userData.spinsToday;
                    document.getElementById('ref-count').innerText = userData.referralCount;
                });
                loadHistory(user.uid);
            } else {
                document.getElementById('login-section').style.display = 'block';
            }
        });

        document.getElementById('spin-btn').onclick = async () => {
            if (userData.spinsToday <= 0 || userData.bucks < 50) return alert("Low Balance!");
            const now = Date.now();
            if (now - userData.lastSpin < 30000) return alert("Wait 30s!");

            spinCounter++;
            // ప్రతి 10 స్పిన్లకు ఒకసారి ఆటోమేటిక్ యాడ్
            if (spinCounter % 10 === 0) {
                window.open(smartLink, "_blank");
            }

            const wheel = document.getElementById('wheel');
            const deg = Math.floor(Math.random() * 360) + 3600;
            wheel.style.transform = `rotate(${deg}deg)`;

            await updateDoc(doc(db, "users", auth.currentUser.uid), { lastSpin: now, bucks: increment(-50), spinsToday: increment(-1) });

            setTimeout(async () => {
                const won = Math.floor(Math.random() * 200) + 1;
                if (confirm(`${won} Bucks Won! Watch Ad to Double?`)) {
                    window.open(smartLink, "_blank");
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { bucks: increment(won * 2) });
                } else {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { bucks: increment(won) });
                }
            }, 4000);
        };

        // రివార్డ్స్ క్లిక్ చేసినప్పుడు యాడ్ ప్లే అవుతుంది
        document.getElementById('daily-btn').onclick = () => { 
            window.open(smartLink, "_blank"); 
            updateDoc(doc(db, "users", auth.currentUser.uid), { spinsToday: increment(10) }); 
            alert("Daily Reward Added!"); 
        };

        document.getElementById('hourly-btn').onclick = () => { 
            window.open(smartLink, "_blank"); 
            updateDoc(doc(db, "users", auth.currentUser.uid), { spinsToday: increment(5) }); 
            alert("Hourly Reward Added!"); 
        };

        document.getElementById('withdraw-action-btn').onclick = async () => {
            if (userData.referralCount < 1 || userData.walletRupees < 50) return alert("Not Eligible!");
            
            // విత్‌డ్రా క్లిక్ చేసినప్పుడు కూడా యాడ్
            window.open(smartLink, "_blank");

            const upi = prompt("Enter UPI ID:");
            if (upi) {
                await addDoc(collection(db, "withdrawals"), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, upi, amount: userData.walletRupees, status: "Pending", date: serverTimestamp() });
                await updateDoc(doc(db, "users", auth.currentUser.uid), { walletRupees: 0 });
                alert("Withdraw Request Sent!");
            }
        };

        function loadHistory(uid) {
            const q = query(collection(db, "withdrawals"), where("uid", "==", uid), orderBy("date", "desc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<li>₹${data.amount} - ${data.status}</li>`;
                });
            });
        }

        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        const ctx = document.getElementById('wheel').getContext('2d');
        const colors = ['#e74c3c','#3498db','#f1c40f','#2ecc71','#9b59b6','#1abc9c','#e67e22','#34495e'];
        for(let i=0; i<8; i++) {
            ctx.beginPath(); ctx.moveTo(150,150);
            ctx.arc(150,150,150, i*Math.PI/4, (i+1)*Math.PI/4);
            ctx.fillStyle = colors[i]; ctx.fill();
        }
    </script>
</body>
</html>
