<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Spin & Earn - Pro Version</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .dashboard { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; margin-top: 15px; min-width: 320px; }
        .balance-box { display: flex; justify-content: space-around; margin: 15px 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .stat { font-weight: bold; color: #2ecc71; }
        #wheel-container { margin: 20px auto; position: relative; width: 280px; height: 280px; }
        canvas { border: 5px solid #333; border-radius: 50%; width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .btn { padding: 12px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 5px; width: 85%; max-width: 300px; color: white; font-weight: bold; }
        #spin-btn { background: #e74c3c; }
        .bonus-btn { background: #3498db; }
        .bonus-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .withdraw-btn { background: #f39c12; }
        .ref-box { background: #ecf0f1; padding: 10px; margin-top: 15px; border-radius: 8px; font-size: 13px; word-break: break-all; }
        #game-area, #login-section { display: none; }
    </style>
</head>
<body>

    <div id="login-section">
        <h2 style="margin-top: 50px;">Spin & Earn లోకి స్వాగతం</h2>
        <p>జాయిన్ అవ్వడానికి రిఫరల్ లింక్ తప్పనిసరి.</p>
        <button id="login-btn" class="btn" style="background: #4285F4;">Google తో లాగిన్ అవ్వండి</button>
    </div>

    <div id="game-area">
        <div class="dashboard">
            <h3 id="user-name">Loading...</h3>
            <div class="balance-box">
                <div>Bucks: <span id="bucks-bal" class="stat">0</span></div>
                <div>Wallet: <span id="wallet-bal" class="stat">₹0</span></div>
            </div>
            <div style="font-size: 14px; margin-bottom: 10px;">
                నేటి స్పిన్స్: <span id="spins-left">0</span> | రిఫరల్స్: <span id="ref-count">0</span>
            </div>
            <button class="btn withdraw-btn" onclick="handleWithdraw()">Withdraw (Min Rs.50 + 1 Ref)</button>
            <div class="ref-box">మీ రిఫరల్ లింక్:<br><span id="ref-link" style="color: #2980b9;"></span></div>
        </div>

        <div id="wheel-container">
            <canvas id="wheel" width="300" height="300"></canvas>
        </div>

        <button id="spin-btn" class="btn" onclick="startSpin()">Spin (30s Cooldown)</button>
        
        <div style="margin-top: 10px;">
            <button id="daily-btn" class="btn bonus-btn" onclick="claimBonus('daily')">Daily Reward (+10 Spins)</button>
            <button id="hourly-btn" class="btn bonus-btn" onclick="claimBonus('hourly')">Hourly Reward (+5 Spins)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot, serverTimestamp, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1P5PoYl467FXxaaWFaCGHWuZs1yUMGwY",
            authDomain: "gemini-spinning-wheel-game.firebaseapp.com",
            projectId: "gemini-spinning-wheel-game",
            storageBucket: "gemini-spinning-wheel-game.firebasestorage.app",
            messagingSenderId: "691322332189",
            appId: "1:691322332189:web:e757b79d4d9eb010b692f4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userData = {};
        const urlParams = new URLSearchParams(window.location.search);
        const referrerId = urlParams.get('ref');

        // 1. Fingerprint (Device ID)
        async function getDeviceID() {
            const fp = await import('https://openfpcdn.io/fingerprintjs/v4').then(FingerprintJS => FingerprintJS.load());
            const result = await fp.get();
            return result.visitorId;
        }

        // 2. Auth State
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const deviceID = await getDeviceID();
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    if (!referrerId) {
                        alert("జాయిన్ అవ్వడానికి రిఫరల్ లింక్ తప్పనిసరి!");
                        auth.signOut();
                        location.reload();
                        return;
                    }
                    // Device check: ఒకే డివైజ్‌లో ఒక అకౌంట్
                    const q = query(collection(db, "users"), where("deviceId", "==", deviceID));
                    const qSnap = await getDocs(q);
                    if (!qSnap.empty) {
                        alert("ఈ డివైజ్‌లో ఇప్పటికే ఒక అకౌంట్ ఉంది!");
                        auth.signOut();
                        return;
                    }

                    await setDoc(userRef, {
                        bucks: 0, walletRupees: 0, spinsToday: 10, 
                        deviceId: deviceID, referredBy: referrerId, referralCount: 0,
                        lastDaily: 0, lastHourly: 0, lastSpin: 0, lastDate: new Date().toDateString()
                    });
                    // రిఫరర్ కి కౌంట్ పెంచడం
                    await updateDoc(doc(db, "users", referrerId), { referralCount: increment(1) });
                }

                document.getElementById('login-section').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
                document.getElementById('ref-link').innerText = window.location.origin + window.location.pathname + "?ref=" + user.uid;

                onSnapshot(userRef, (doc) => {
                    userData = doc.data();
                    updateUI();
                    checkAutoConvert(user.uid);
                });
            } else {
                document.getElementById('login-section').style.display = 'block';
            }
        });

        function updateUI() {
            document.getElementById('user-name').innerText = "హలో, " + auth.currentUser.displayName;
            document.getElementById('bucks-bal').innerText = userData.bucks;
            document.getElementById('wallet-bal').innerText = "₹" + userData.walletRupees;
            document.getElementById('spins-left').innerText = userData.spinsToday;
            document.getElementById('ref-count').innerText = userData.referralCount;

            // Button Locking Logic
            const now = Date.now();
            const today = new Date().toDateString();
            
            document.getElementById('daily-btn').disabled = (userData.lastDate === today && userData.lastDaily > 0);
            document.getElementById('hourly-btn').disabled = (now - userData.lastHourly < 3600000);
            document.getElementById('spin-btn').disabled = (now - userData.lastSpin < 30000);
        }

        // 3. Auto Convert: 1000 Bucks = ₹1
        async function checkAutoConvert(uid) {
            if (userData.bucks >= 1000) {
                await updateDoc(doc(db, "users", uid), {
                    bucks: increment(-1000),
                    walletRupees: increment(1)
                });
            }
        }

        // 4. Spin Logic
        window.startSpin = async () => {
            if (userData.spinsToday <= 0) return alert("స్పిన్స్ అయిపోయాయి!");
            const now = Date.now();
            if (now - userData.lastSpin < 30000) return;

            const wheel = document.getElementById('wheel');
            const deg = Math.floor(Math.random() * 360) + 3600;
            wheel.style.transform = `rotate(${deg}deg)`;

            await updateDoc(doc(db, "users", auth.currentUser.uid), { lastSpin: now });

            setTimeout(async () => {
                const won = Math.floor(Math.random() * 200) + 1;
                let finalWon = won;
                
                if (confirm(`${won} Bucks గెలిచారు! వీడియో చూసి Double (x2) చేయాలా?`)) {
                    window.open("YOUR_ADSTERRA_DIRECT_LINK", "_blank");
                    finalWon = won * 2;
                }

                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    bucks: increment(finalWon),
                    spinsToday: increment(-1)
                });
            }, 4000);
        };

        // 5. Bonus Logic (Hourly/Daily)
        window.claimBonus = async (type) => {
            window.open("YOUR_ADSTERRA_DIRECT_LINK", "_blank");
            const userRef = doc(db, "users", auth.currentUser.uid);
            const now = Date.now();

            if (type === 'daily') {
                await updateDoc(userRef, { spinsToday: increment(10), lastDaily: now, lastDate: new Date().toDateString() });
            } else {
                await updateDoc(userRef, { spinsToday: increment(5), lastHourly: now });
            }
            alert("Bonus యాడ్ అయ్యింది! Ads చూసినందుకు ధన్యవాదాలు.");
        };

        // 6. Withdraw

        window.handleWithdraw = async () => {
    // 1. రిఫరల్ చెక్ (కనీసం 1 ఉండాలి)
    if (!userData.referralCount || userData.referralCount < 1) {
        alert("క్షమించండి! విత్ డ్రా చేయాలంటే కనీసం ఒకరిని (1 Referral) రిఫర్ చేయాలి.");
        return; // ఇక్కడ ఆగిపోతుంది, UPI అడగదు
    }

    // 2. వాలెట్ బ్యాలెన్స్ చెక్ (కనీసం ₹50 ఉండాలి)
    if (!userData.walletRupees || userData.walletRupees < 50) {
        alert("మీ వాలెట్‌లో కనీసం Rs.50 ఉండాలి. ప్రస్తుతం మీ దగ్గర Rs." + (userData.walletRupees || 0) + " మాత్రమే ఉన్నాయి.");
        return; // ఇక్కడ ఆగిపోతుంది
    }

    // 3. కండిషన్స్ అన్నీ ఓకే అయితేనే ఇక్కడికి వస్తుంది
    const upi = prompt("మీ UPI ID ఎంటర్ చేయండి (e.g., name@okaxis):");
    const ph = prompt("మీ ఫోన్ నంబర్ ఎంటర్ చేయండి:");

    if (upi && ph) {
        try {
            await addDoc(collection(db, "withdrawals"), {
                uid: auth.currentUser.uid,
                name: auth.currentUser.displayName,
                upi: upi,
                phone: ph,
                amount: userData.walletRupees,
                status: "Pending",
                date: serverTimestamp()
            });
            alert("ధన్యవాదాలు! మీ రిక్వెస్ట్ పంపబడింది. 24 గంటల్లో వెరిఫై చేసి పేమెంట్ చేయబడుతుంది.");
        } catch (error) {
            console.error("Withdraw Error:", error);
            alert("రిక్వెస్ట్ పంపడంలో సమస్య ఏర్పడింది. మళ్ళీ ప్రయత్నించండి.");
        }
    } else {
        alert("UPI ID మరియు ఫోన్ నంబర్ తప్పనిసరి!");
    }
};



        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);

        // Drawing simple wheel
        const ctx = document.getElementById('wheel').getContext('2d');
        const colors = ['#e74c3c','#3498db','#f1c40f','#2ecc71','#9b59b6','#1abc9c','#e67e22','#34495e'];
        for(let i=0; i<8; i++) {
            ctx.beginPath(); ctx.moveTo(150,150);
            ctx.arc(150,150,150, i*Math.PI/4, (i+1)*Math.PI/4);
            ctx.fillStyle = colors[i]; ctx.fill();
        }
    </script>
</body>
</html>
